name: Release-plz

on:
  push:
    branches:
      - main

jobs:
  # Release unpublished packages.
  release-plz-release:
    name: Release-plz release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: release-plz-release-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - &checkout
        name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - &install-rust
        name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - &install-linux-deps
        name: Install linux deps
        run: |
          sudo apt update
          sudo apt install -y --no-install-recommends libasound2-dev pkg-config
      - name: Run release-plz
        id: release-plz
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Check if youtui was released
        id: check_youtui_release
        if: ${{ steps.release-plz.outputs.releases_created == 'true' }}
        env:
          RELEASES: ${{ steps.release-plz.outputs.releases }}
        run: |
          # Safely parse JSON from env variable using a here-string
          YOUTUI_IS_RELEASED=$(jq -r 'any(.[]; .package_name == "youtui")' <<< "$RELEASES")
          echo "Checking if youtui was released: $YOUTUI_IS_RELEASED"
          echo "youtui_released=$YOUTUI_IS_RELEASED" >> "$GITHUB_OUTPUT"
          
          if [ "$YOUTUI_IS_RELEASED" == "true" ]; then
             YOUTUI_VERSION=$(jq -r '.[] | select(.package_name == "youtui") | .version' <<< "$RELEASES")
             echo "released version: $YOUTUI_VERSION"
             echo "youtui_version=$YOUTUI_VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Release youtui to AUR
        if: ${{ steps.check_youtui_release.outputs.youtui_released == 'true' }}
        env:
          NEW_YOUTUI_VERSION: ${{ steps.check_youtui_release.outputs.youtui_version }}
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          # 1. Grab host IDs to prevent Docker permission errors
          HOST_UID=$(id -u)
          HOST_GID=$(id -g)
          
          # 2. Write SSH key safely to a temporary file
          echo "$AUR_SSH_PRIVATE_KEY" > /tmp/aur_key
          chmod 600 /tmp/aur_key

          # 3. Create an Ephemeral Dockerfile
          cat <<EOF > Dockerfile.aur
          FROM archlinux/archlinux:base-devel
          
          # Fix keyring before updating
          RUN pacman -Sy archlinux-keyring --noconfirm && \
              pacman -Su --noconfirm && \
              pacman -S --noconfirm --needed git openssh just pacman-contrib rust sudo

          # Create non-root builder matching exact host permissions
          RUN groupadd -g $HOST_GID builder && \
              useradd -u $HOST_UID -g $HOST_GID -m builder && \
              echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
              
          USER builder
          WORKDIR /workspace
          
          # Configure SSH known hosts for the container user
          RUN mkdir -p /home/builder/.ssh && \
              ssh-keyscan aur.archlinux.org >> /home/builder/.ssh/known_hosts
          EOF

          # Build the ephemeral image
          docker build -t aur-builder -f Dockerfile.aur .

          # 4. Run builder securely without modifying SSH_AUTH_SOCK permissions
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -v "/tmp/aur_key:/home/builder/.ssh/id_rsa:ro" \
            -e NEW_YOUTUI_VERSION="$NEW_YOUTUI_VERSION" \
            aur-builder \
            /bin/bash -c '
              git config --global --add safe.directory /workspace &&
              git config --global user.email "nick42d-bot@users.noreply.github.com" &&
              git config --global user.name "nick42d-bot" &&
              just release-youtui-to-aur $NEW_YOUTUI_VERSION
            '
            
          # Clean up the SSH key
          rm /tmp/aur_key

  # Create a PR with the new versions and changelog, preparing the next release.
  release-plz-pr:
    name: Release-plz PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - *checkout
      - *install-rust
      - *install-linux-deps
      - name: Run release-plz
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
